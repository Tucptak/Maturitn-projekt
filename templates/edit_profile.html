{% extends 'base.html' %}

{% block title %}Upravit profil - Brainiac{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h1>Upravit profil</h1>
    </div>
    
    <div class="form-card">
        <form method="POST" enctype="multipart/form-data" class="edit-form">
            <div class="form-group">
                <label for="name">Jméno</label>
                <input type="text" id="name" name="name" required 
                       value="{{ current_user.name }}" minlength="2">
            </div>
            
            <div class="form-group">
                <label for="avatar">Profilový obrázek</label>
                <input type="file" id="avatar" name="avatar" accept="image/*">
                <small class="form-hint">Podporované formáty: PNG, JPG, GIF</small>
            </div>
            
            <div class="form-actions">
                <a href="{{ url_for('auth.profile') }}" class="btn btn-outline">Zrušit</a>
                <button type="submit" class="btn btn-primary">Uložit změny</button>
            </div>
        </form>
    </div>
    
    <div class="form-card" style="margin-top: 2rem;">
        <h2>Změna hesla</h2>
        <form method="POST" action="{{ url_for('auth.change_password') }}" class="password-form">
            <div class="form-group">
                <label for="current_password">Současné heslo</label>
                <input type="password" id="current_password" name="current_password" required>
            </div>
            <div class="form-group">
                <label for="new_password">Nové heslo</label>
                <input type="password" id="new_password" name="new_password" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm_password">Potvrzení hesla</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-primary">Změnit heslo</button>
        </form>
    </div>
</div>
{% endblock %}
